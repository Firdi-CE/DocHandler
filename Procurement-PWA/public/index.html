<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PBE Procurement Upload</title>
</head>
<body>
    <h1>Upload Procurement Document</h1>
    <form id="uploadForm">
        <input type="file" name="document" required>
        
        <input type="hidden" id="senderId" value="1"> 
        <input type="hidden" id="projectId" value="1">
        
        <div>
            <label>Department:</label>
            <select id="deptDropdown" name="departmentId" onchange="loadUsers()" required>
                <option value="">-- Select --</option>
                <option value="1">Engineering</option>
                <option value="2">Procurement</option>
                <option value="3">Site Managers</option>
                <option value="5">Finance</option>
            </select>
        </div>

        <div>
            <label>Recipient (PIC):</label>
            <select id="picDropdown" name="recipientId" required>
                <option value="">-- Choose Dept first --</option>
            </select>
        </div>
        
        <button type="submit">Upload & Route</button>
    </form>

    <script>
        async function loadUsers() {
            const deptId = document.getElementById('deptDropdown').value;
            const picDropdown = document.getElementById('picDropdown');
            picDropdown.innerHTML = '<option value="">-- Loading... --</option>';

            const res = await fetch(`/users/by-department/${deptId}`);
            const users = await res.json();
            
            picDropdown.innerHTML = '<option value="">-- Choose Person --</option>';
            users.forEach(u => {
                const opt = document.createElement('option');
                opt.value = u.id;
                opt.textContent = u.email;
                picDropdown.appendChild(opt);
            });
        }

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            formData.append('senderId', document.getElementById('senderId').value);
            formData.append('projectId', document.getElementById('projectId').value);

            const res = await fetch('/upload', { method: 'POST', body: formData });
            if (res.ok) alert('File uploaded and routed!');
        };
    </script>
</body>
</html>
