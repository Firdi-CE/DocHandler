<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — DocHandler</title>
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f4f7f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      border: 3px solid #111;
      border-radius: 16px;
      box-shadow: 8px 8px 0 #111;
      padding: 2.5rem;
      max-width: 420px;
      width: 90%;
      text-align: center;
    }
    h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 1rem; }
    .google-btn {
      display: inline-block;
      padding: 12px 24px;
      background: #4285f4;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      margin-top: 1rem;
    }
    .google-btn:hover { background: #357ae8; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign In</h1>
    <p>Please log in using your company account.</p>
    
    <a href="/auth/google" class="google-btn">Login with Google</a>
  </div>
</body>
</html>
