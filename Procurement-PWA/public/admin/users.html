<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management — Admin</title>
  <link rel="stylesheet" href="/theme.css">
  <style>
    body { padding: 2rem; }
    .card { max-width: 900px; margin: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 0.75rem 0.5rem; border-bottom: 1px solid var(--border); font-size: 0.72rem; text-transform: uppercase; color: var(--text-muted); }
    td { padding: 0.75rem 0.5rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    .btn-assign { background: var(--steel); color: white; border: none; border-radius: var(--radius); padding: 4px 12px; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
    .btn-assign:hover { background: var(--steel-hover); }
    .status-msg { padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; display: none; }
    .status-msg.success { display: block; background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green-text); }
    .status-msg.error { display: block; background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red-text); }
    .modal-overlay {
      display: none; position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.4); justify-content: center; align-items: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12); padding: 2rem; max-width: 500px; width: 90%;
    }
    .modal h3 { margin-bottom: 1rem; }
    .modal label { display: block; font-weight: 600; margin: 0.5rem 0 0.25rem; }
    .modal select { width: 100%; padding: 8px; border: 1px solid var(--border-strong); border-radius: var(--radius); margin-bottom: 0.5rem; }
    .modal .btn-group { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .modal .btn-save { background: var(--steel); color: white; border: none; border-radius: var(--radius); padding: 8px 16px; cursor: pointer; font-weight: 600; }
    .modal .btn-save:hover { background: var(--steel-hover); }
    .modal .btn-cancel { background: var(--bg-muted); border: 1px solid var(--border-strong); border-radius: var(--radius); padding: 8px 16px; cursor: pointer; font-weight: 600; }
  </style>
</head>
<body class="full-bleed">

<div class="app-shell">
  <aside class="app-sidebar">
    <div class="sidebar-logo">
      <img src="/assets/logo.png" alt="Pilar Energi">
      <span>DocHandler</span>
    </div>
    <nav class="sidebar-nav">
      <a class="sidebar-link" href="/dashboard.html">Documents</a>
      <a class="sidebar-link" href="/dashboard.html?view=upload">Upload</a>
      <a class="sidebar-link" href="/profile.html">Profile</a>

      <div id="adminNavGroup">
        <button class="sidebar-group-toggle open" id="adminGroupToggle" onclick="toggleSidebarGroup('adminSubmenu', this)">
          Admin <span class="chevron">&#9660;</span>
        </button>
        <div class="sidebar-submenu open" id="adminSubmenu">
          <a class="sidebar-link" href="/admin.html">Overview</a>
          <a class="sidebar-link active" href="/admin/users.html">Users</a>
          <a class="sidebar-link" href="/admin/projects.html">Projects</a>
          <a class="sidebar-link" href="/admin/approvals.html">Approvals</a>
        </div>
      </div>
    </nav>
  </aside>

  <div class="app-main">
    <div class="app-header">
      <h2 style="color:var(--navy);font-size:1.1rem;">User Management</h2>
      <div class="header-user">
        <button onclick="logout()">Sign out</button>
      </div>
    </div>

    <div class="app-content">
      <div class="card">
        <div id="statusMessage" class="status-msg"></div>

        <h3 style="margin-bottom:1rem;">All Approved Users</h3>
        <table>
          <thead>
            <tr><th>Email</th><th>Name</th><th>Role</th><th>Department</th><th>Projects</th></tr>
          </thead>
          <tbody id="usersBody">
            <tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text-muted);">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Project Assignment Modal -->
<div class="modal-overlay" id="projectModal">
  <div class="modal">
    <h3>Assign Project</h3>
    <p id="assignUserLabel" style="margin-bottom:1rem;color:#555;"></p>
    <label for="projectSelect">Select Projects (hold Ctrl / Cmd to select multiple):</label>
    <select id="projectSelect" multiple style="height:160px;"></select>
    <div class="btn-group">
      <button class="btn-save" onclick="saveAssignment()">Save Assignment</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
  const API_BASE = '';
  const token = localStorage.getItem('token');
  if (!token) window.location.href = '/login.html?reason=expired';

  // Gate: only Executive and Admin roles can access admin pages
  (async () => {
    try {
      const res = await fetch('/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
      if (res.status === 401) { window.location.href = '/login.html?reason=expired'; return; }
      const user = await res.json();
      if (user.role !== 'Executive' && user.role !== 'Admin') {
        window.location.href = '/dashboard.html';
      }
    } catch (e) { /* non-fatal, backend will enforce via 403 */ }
  })();

  let currentUserId = null;

  function toggleSidebarGroup(submenuId, toggleBtn) {
    const submenu = document.getElementById(submenuId);
    const isOpen = submenu.classList.toggle('open');
    toggleBtn.classList.toggle('open', isOpen);
  }

  function showStatus(msg, type) {
    const el = document.getElementById('statusMessage');
    el.textContent = msg; el.className = 'status-msg ' + type;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '/login.html';
  }

  async function loadUsers() {
    try {
      const res = await fetch(API_BASE + '/admin/users', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (res.status === 401) { logout(); return; }
      if (res.status === 403) { window.location.href = '/dashboard.html'; return; }
      const users = await res.json();
      const tbody = document.getElementById('usersBody');
      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:2rem;color:#888;">No users found.</td></tr>';
        return;
      }
      tbody.innerHTML = users.map(u => `
        <tr>
          <td>${u.email}</td>
          <td>${u.display_name || '—'}</td>
          <td>${u.role}</td>
          <td>${u.department_name || '—'}</td>
          <td><button class="btn-assign" onclick="openAssignModal(${u.id}, '${u.email.replace(/'/g, "\\'")}')">Assign Project</button></td>
        </tr>
      `).join('');
    } catch (e) {
      document.getElementById('usersBody').innerHTML =
        '<tr><td colspan="5" style="text-align:center;padding:2rem;color:#888;">Failed to load.</td></tr>';
    }
  }

  async function openAssignModal(userId, userEmail) {
    currentUserId = userId;
    document.getElementById('assignUserLabel').textContent = 'Assigning project for: ' + userEmail;
    document.getElementById('projectModal').classList.add('open');

    try {
      const projRes = await fetch(API_BASE + '/projects', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const allProjects = await projRes.json();
      const projectSelect = document.getElementById('projectSelect');

      if (allProjects.length === 0) {
        projectSelect.innerHTML = '<option value="">No projects available</option>';
        projectSelect.disabled = true;
        return;
      }

      projectSelect.disabled = false;

      // Load this user's existing assignments so they show pre-selected
      let existingIds = new Set();
      try {
        const assignRes = await fetch(API_BASE + '/admin/users/' + currentUserId + '/projects', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (assignRes.ok) {
          const existing = await assignRes.json();
          existing.forEach(p => existingIds.add(p.project_id));
        }
      } catch(e) { /* non-fatal, just won't pre-select */ }

      projectSelect.innerHTML = allProjects
        .map(p => `<option value="${p.id}" ${existingIds.has(p.id) ? 'selected' : ''}>${p.name}</option>`)
        .join('');
    } catch (error) {
      console.error('Error loading projects:', error);
      showStatus('Failed to load projects.', 'error');
    }
  }

  function closeModal() {
    document.getElementById('projectModal').classList.remove('open');
    currentUserId = null;
  }

  async function saveAssignment() {
    const projectSelect = document.getElementById('projectSelect');
    const selectedProjectIds = [...projectSelect.selectedOptions].map(o => parseInt(o.value));

    if (selectedProjectIds.length === 0) {
      showStatus('Select at least one project (or zero to clear all assignments).', 'error');
      return;
    }

    try {
      const res = await fetch(API_BASE + '/admin/assign-project', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ user_id: currentUserId, project_ids: selectedProjectIds })
      });

      const data = await res.json();

      if (res.ok) {
        showStatus(`Assigned to ${selectedProjectIds.length} project(s) successfully.`, 'success');
        closeModal();
        loadUsers();
      } else {
        showStatus(data.message || 'Failed to assign projects.', 'error');
      }
    } catch (error) {
      console.error('Assignment error:', error);
      showStatus('Failed to assign projects.', 'error');
    }
  }

  loadUsers();
</script>

</body>
</html>
