<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management — Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f4f7f6; padding: 2rem; }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      max-width: 900px; margin: 0 auto 1.5rem;
    }
    .topbar h2 { font-size: 1.4rem; }
    .topbar button { background: none; border: 2px solid #111; border-radius: 6px; padding: 4px 12px; cursor: pointer; font-weight: 600; }
    .card { background: white; border: 3px solid #111; border-radius: 16px; box-shadow: 8px 8px 0 #111; padding: 2rem; max-width: 900px; margin: auto; }
    .nav-links { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
    .nav-links a { color: #0284c7; font-size: 0.9rem; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 0.75rem 0.5rem; border-bottom: 2px solid #111; font-size: 0.8rem; text-transform: uppercase; color: #555; }
    td { padding: 0.75rem 0.5rem; border-bottom: 1px solid #e5e7eb; font-size: 0.9rem; }
    .btn-assign { background: #0284c7; color: white; border: 2px solid #111; border-radius: 6px; padding: 4px 12px; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
    .status-msg { padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; display: none; }
    .status-msg.success { display: block; background: #ecfdf5; border: 2px solid #10b981; color: #065f46; }
    .status-msg.error { display: block; background: #fef2f2; border: 2px solid #ef4444; color: #b91c1c; }
    .modal-overlay {
      display: none; position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.4); justify-content: center; align-items: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border: 3px solid #111; border-radius: 16px;
      box-shadow: 8px 8px 0 #111; padding: 2rem; max-width: 500px; width: 90%;
    }
    .modal h3 { margin-bottom: 1rem; }
    .modal label { display: block; font-weight: 600; margin: 0.5rem 0 0.25rem; }
    .modal select { width: 100%; padding: 8px; border: 2px solid #111; border-radius: 6px; margin-bottom: 0.5rem; }
    .modal .btn-group { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .modal .btn-save { background: #10b981; color: white; border: 2px solid #111; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-weight: 600; }
    .modal .btn-cancel { background: #e5e7eb; border: 2px solid #111; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-weight: 600; }
  </style>
</head>
<body>

<div class="topbar">
  <h2>👥 Admin — User Management</h2>
  <button onclick="logout()">Sign Out</button>
</div>

<div class="card">
  <div class="nav-links">
    <a href="approvals.html">📋 Approvals</a>
    <a href="users.html">👥 User Management</a>
    <a href="projects.html">📁 Projects</a>
    <a href="/dashboard.html">← Dashboard</a>
  </div>

  <div id="statusMessage" class="status-msg"></div>

  <h3 style="margin-bottom:1rem;">All Approved Users</h3>
  <table>
    <thead>
      <tr><th>Email</th><th>Name</th><th>Role</th><th>Department</th><th>Projects</th></tr>
    </thead>
    <tbody id="usersBody">
      <tr><td colspan="5" style="text-align:center;padding:2rem;color:#888;">Loading...</td></tr>
    </tbody>
  </table>
</div>

<!-- Project Assignment Modal -->
<div class="modal-overlay" id="projectModal">
  <div class="modal">
    <h3>Assign Project</h3>
    <p id="assignUserLabel" style="margin-bottom:1rem;color:#555;"></p>
    <label for="projectSelect">Select Project:</label>
    <select id="projectSelect"></select>
    <div class="btn-group">
      <button class="btn-save" onclick="saveAssignment()">Save Assignment</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
  let currentUserId = null; 

async function openAssignModal(userId, userEmail) {
    currentUserId = userId;
    document.getElementById('assignUserLabel').textContent = 'Assigning project for: ' + userEmail;
    document.getElementById('projectModal').classList.add('open');

    try {
        const projRes = await fetch('/projects', {
            headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
        });
        const allProjects = await projRes.json();
        const projectSelect = document.getElementById('projectSelect');

        if (allProjects.length === 0) {
            projectSelect.innerHTML = '<option value="">No projects available</option>';
            projectSelect.disabled = true;
            return;
        }

        projectSelect.disabled = false;
        
        // FIXED: Populated the template literal with actual HTML option tags and variables.
        // Note: Adjusted to map p.id and p.name (or p.project_name depending on your DB schema).
        projectSelect.innerHTML = '<option value="" disabled selected>-- Select a Project --</option>' + 
            allProjects.map(p => `<option value="${p.id}">${p.name || p.project_name}</option>`).join('');

    } catch (error) {
        console.error("Error loading projects:", error);
    }
}

function closeModal() {
    document.getElementById('projectModal').classList.remove('open');
    currentUserId = null;
}

async function saveAssignment() {
    const projectSelect = document.getElementById('projectSelect');
    const selectedProjectId = projectSelect.value;

    if (!selectedProjectId) {
        alert('Please select a project.'); // Fallback if showStatus isn't defined
        return;
    }

    try {
        const res = await fetch('/admin/assign-project', {
            method: 'POST',
            headers: { 
                'Authorization': 'Bearer ' + localStorage.getItem('token'), 
                'Content-Type': 'application/json' 
            },
            body: JSON.stringify({ user_id: currentUserId, project_id: parseInt(selectedProjectId) })
        });
        
        const data = await res.json();
        
        if (res.ok) {
            alert('Project assigned successfully.'); // Or use your showStatus('...', 'success') function
            closeModal();
            loadUsers(); // Reloads the user table to show the new mapped data
        } else {
            // FIXED: Target 'data.message' to catch the 409 Conflict error from the backend
            alert(data.message || 'Failed to assign project.'); 
        }
    } catch (error) {
        console.error("Assignment error:", error);
    }
}
</script>

</body>
</html>
