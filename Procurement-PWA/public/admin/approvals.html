<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Approve Accounts — Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f4f7f6; padding: 2rem; }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      max-width: 800px; margin: 0 auto 1.5rem;
    }
    .topbar h2 { font-size: 1.4rem; }
    .topbar button {
      background: none; border: 2px solid #111; border-radius: 6px;
      padding: 4px 12px; cursor: pointer; font-weight: 600;
    }
    .card {
      background: white; border: 3px solid #111; border-radius: 16px;
      box-shadow: 8px 8px 0 #111; padding: 2rem; max-width: 800px; margin: auto;
    }
    .nav-links { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
    .nav-links a { color: #0284c7; font-size: 0.9rem; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 0.75rem 0.5rem; border-bottom: 2px solid #111; font-size: 0.8rem; text-transform: uppercase; color: #555; }
    td { padding: 0.75rem 0.5rem; border-bottom: 1px solid #e5e7eb; font-size: 0.9rem; }
    .approve-form { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    .approve-form select { padding: 4px 8px; border: 2px solid #111; border-radius: 4px; font-size: 0.8rem; }
    .btn-approve { background: #10b981; color: white; border: 2px solid #111; border-radius: 6px; padding: 4px 12px; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
    .btn-reject { background: #ef4444; color: white; border: 2px solid #111; border-radius: 6px; padding: 4px 12px; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
    .empty-state { text-align: center; padding: 3rem; color: #888; }
    .status-msg { padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; display: none; }
    .status-msg.success { display: block; background: #ecfdf5; border: 2px solid #10b981; color: #065f46; }
    .status-msg.error { display: block; background: #fef2f2; border: 2px solid #ef4444; color: #b91c1c; }
  </style>
</head>
<body>

<div class="topbar">
  <h2>⚙ Admin — Account Approvals</h2>
  <button onclick="logout()">Sign Out</button>
</div>

<div class="card">
  <div class="nav-links">
    <a href="approvals.html">📋 Approvals</a>
    <a href="users.html">👥 User Management</a>
    <a href="projects.html">📁 Projects</a>
    <a href="/dashboard.html">← Dashboard</a>
  </div>

  <div id="statusMessage" class="status-msg"></div>

  <h3 style="margin-bottom:1rem;">Pending Account Requests</h3>
  <table>
    <thead>
      <tr><th>Email</th><th>Name</th><th>Requested</th><th>Action</th></tr>
    </thead>
    <tbody id="requestsBody">
      <tr><td colspan="4" class="empty-state">Loading...</td></tr>
    </tbody>
  </table>
</div>

<script>
  const API_BASE = '';
  const token = localStorage.getItem('token');
  if (!token) window.location.href = '/login.html?reason=expired';

  let departments = [];

  async function loadDepartments() {
    const res = await fetch(API_BASE + '/departments', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    return res.json();
  }

  function showStatus(msg, type) {
    const el = document.getElementById('statusMessage');
    el.textContent = msg;
    el.className = 'status-msg ' + type;
    setTimeout(() => el.style.display = 'none', 3000);
  }

  async function loadRequests() {
    try {
      departments = await loadDepartments();
      const res = await fetch(API_BASE + '/admin/pending-accounts', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (res.status === 403) { window.location.href = '/dashboard.html'; return; }
      const requests = await res.json();
      const tbody = document.getElementById('requestsBody');

      if (requests.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No pending requests.</td></tr>';
        return;
      }

      tbody.innerHTML = requests.map(r => `
        <tr>
          <td>${r.email}</td>
          <td>${r.display_name || '—'}</td>
          <td style="font-size:0.8rem;color:#666;">${new Date(r.created_at).toLocaleDateString()}</td>
          <td>
            <div class="approve-form">
              <select id="dept-${r.id}" required>
                <option value="">Dept...</option>
                ${departments.map(d => `<option value="${d.id}">${d.name}</option>`).join('')}
              </select>
              <select id="role-${r.id}">
                <option value="Staff">Staff</option>
                <option value="Supervisor">Supervisor</option>
                <option value="Executive">Executive</option>
              </select>
              <button class="btn-approve" onclick="approve(${r.id})">Approve</button>
              <button class="btn-reject" onclick="reject(${r.id})">Reject</button>
            </div>
          </td>
        </tr>
      `).join('');
    } catch (e) {
      document.getElementById('requestsBody').innerHTML =
        '<tr><td colspan="4" class="empty-state">Failed to load.</td></tr>';
    }
  }

  async function approve(requestId) {
    const deptId = document.getElementById('dept-' + requestId).value;
    const role = document.getElementById('role-' + requestId).value;
    if (!deptId) { alert('Please select a department.'); return; }

    const res = await fetch(API_BASE + '/admin/approve-account', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ requestId, departmentId: parseInt(deptId), role })
    });
    const data = await res.json();
    if (res.ok) {
      showStatus(data.message, 'success');
      loadRequests();
    } else {
      showStatus(data.error, 'error');
    }
  }

  async function reject(requestId) {
    if (!confirm('Reject this request?')) return;
    const res = await fetch(API_BASE + '/admin/reject-account', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ requestId })
    });
    const data = await res.json();
    if (res.ok) {
      showStatus(data.message, 'success');
      loadRequests();
    } else {
      showStatus(data.error, 'error');
    }
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '/login.html';
  }

  loadRequests();
</script>

</body>
</html>
