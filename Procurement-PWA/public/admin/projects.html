<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — Admin</title>
  <link rel="stylesheet" href="/theme.css">
  <style>
    body { padding: 2rem; }
    .topbar { max-width: 700px; }
    .card { max-width: 700px; }
    .form-row { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .form-row input { flex: 1; }
    .form-row button { background: var(--steel); color: white; border: none; border-radius: 6px; padding: 10px 20px; cursor: pointer; font-weight: 700; }
    .form-row button:hover { background: var(--steel-hover); }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 0.75rem 0.5rem; border-bottom: 1px solid var(--border); font-size: 0.72rem; text-transform: uppercase; color: var(--text-muted); }
    td { padding: 0.75rem 0.5rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    .status-msg { padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; display: none; }
    .status-msg.success { display: block; background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green-text); }
    .status-msg.error { display: block; background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red-text); }
    .btn-rename { background: #854F0B; color: white; border: none; border-radius: 6px; padding: 4px 12px; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
    .btn-rename:hover { background: #6c3f08; }
    .btn-delete { background: #A32D2D; color: white; border: none; border-radius: 6px; padding: 4px 12px; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
    .btn-delete:hover { background: #872424; }
    .modal .btn-save { background: var(--steel); color: white; }
  </style>
</head>
<body>

<div class="topbar">
  <h2>Admin — Projects</h2>
  <button onclick="logout()">Sign out</button>
</div>

<div class="card">
  <div class="nav-links">
    <a href="approvals.html">Approvals</a>
    <a href="users.html">User Management</a>
    <a href="projects.html">Projects</a>
    <a href="/dashboard.html">&larr; Dashboard</a>
  </div>

  <div id="statusMessage" class="status-msg"></div>

  <h3 style="margin-bottom:1rem;">Create New Project</h3>
  <div class="form-row">
    <input type="text" id="projectName" placeholder="Project name (e.g. Medco Recovery Project)" onkeydown="if(event.key==='Enter') createProject()">
    <button onclick="createProject()">Create</button>
  </div>

  <h3 style="margin-bottom:1rem;">Existing Projects</h3>
  <table>
    <thead><tr><th>ID</th><th>Name</th><th>Actions</th></tr></thead>
    <tbody id="projectsBody">
      <tr><td colspan="3" style="text-align:center;padding:2rem;color:var(--text-muted);">Loading...</td></tr>
    </tbody>
  </table>
</div>

<!-- Rename Project Modal -->
<div class="modal-overlay" id="renameModal">
  <div class="modal">
    <h3>Rename Project</h3>
    <label for="renameInput">New Name:</label>
    <input type="text" id="renameInput" placeholder="Project name">
    <div class="btn-group">
      <button class="btn-save" onclick="saveRename()">Save</button>
      <button class="btn-cancel" onclick="closeRenameModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
  const API_BASE = '';
  const token = localStorage.getItem('token');
  if (!token) window.location.href = '/login.html?reason=expired';

  // Gate: only Executive and Admin roles can access admin pages
  (async () => {
    try {
      const res = await fetch('/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
      if (res.status === 401) { window.location.href = '/login.html?reason=expired'; return; }
      const user = await res.json();
      if (user.role !== 'Executive' && user.role !== 'Admin') {
        window.location.href = '/dashboard.html';
      }
    } catch (e) { /* non-fatal, backend will enforce via 403 */ }
  })();

  let renameProjectId = null;

  function showStatus(msg, type) {
    const el = document.getElementById('statusMessage');
    el.textContent = msg; el.className = 'status-msg ' + type;
    setTimeout(() => el.style.display = 'none', 3000);
  }

  async function loadProjects() {
    try {
      const res = await fetch(API_BASE + '/projects', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (res.status === 401) { logout(); return; }
      if (res.status === 403) { window.location.href = '/dashboard.html'; return; }
      const projects = await res.json();
      const tbody = document.getElementById('projectsBody');
      if (projects.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:2rem;color:#888;">No projects yet.</td></tr>';
        return;
      }
      tbody.innerHTML = projects.map(p => `
        <tr>
          <td style="color:#888;">${p.id}</td>
          <td><strong>${p.name}</strong></td>
          <td>
            <button class="btn-rename" onclick="openRenameModal(${p.id}, '${p.name.replace(/'/g, "\\'")}')">Rename</button>
            <button class="btn-delete" onclick="deleteProject(${p.id}, '${p.name.replace(/'/g, "\\'")}')">Delete</button>
          </td>
        </tr>
      `).join('');
    } catch (e) {
      document.getElementById('projectsBody').innerHTML =
        '<tr><td colspan="3" style="text-align:center;padding:2rem;color:#888;">Failed to load.</td></tr>';
    }
  }

  async function createProject() {
    const name = document.getElementById('projectName').value.trim();
    if (!name) { alert('Enter a project name.'); return; }

    const res = await fetch(API_BASE + '/admin/projects', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ name })
    });
    const data = await res.json();
    if (res.ok) {
      showStatus('Project created!', 'success');
      document.getElementById('projectName').value = '';
      loadProjects();
    } else {
      showStatus(data.error, 'error');
    }
  }

  function openRenameModal(id, currentName) {
    renameProjectId = id;
    document.getElementById('renameInput').value = currentName;
    document.getElementById('renameModal').classList.add('open');
  }

  function closeRenameModal() {
    document.getElementById('renameModal').classList.remove('open');
    renameProjectId = null;
  }

  async function saveRename() {
    const name = document.getElementById('renameInput').value.trim();
    if (!name) { showStatus('Enter a project name.', 'error'); return; }

    try {
      const res = await fetch(API_BASE + '/admin/projects/' + renameProjectId, {
        method: 'PATCH',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });
      const data = await res.json();
      if (res.ok) {
        showStatus('Project renamed!', 'success');
        closeRenameModal();
        loadProjects();
      } else {
        showStatus(data.error || 'Failed to rename project.', 'error');
      }
    } catch (e) {
      showStatus('Network error while renaming project.', 'error');
    }
  }

  async function deleteProject(id, name) {
    if (!confirm(`Delete project "${name}"?\n\nThis will PERMANENTLY DELETE every document ever sent under this project, along with all user-project assignments for it. This cannot be undone.`)) return;

    try {
      const res = await fetch(API_BASE + '/admin/projects/' + id, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      if (res.ok) {
        showStatus('Project deleted.', 'success');
        loadProjects();
      } else {
        showStatus(data.error || 'Failed to delete project.', 'error');
      }
    } catch (e) {
      showStatus('Network error while deleting project.', 'error');
    }
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '/login.html';
  }

  loadProjects();
</script>

</body>
</html>
