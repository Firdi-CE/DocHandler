<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>My Inbox — DocHandler</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f4f7f6;
      padding: 1rem;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1000px;
      margin: 0 auto 1rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .topbar h2 { font-size: 1.2rem; color: #111; }
    .topbar .user-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: #555;
    }
    .topbar button {
      background: none;
      border: 2px solid #111;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.8rem;
      white-space: nowrap;
    }
    .card {
      background: white;
      border: 3px solid #111;
      border-radius: 16px;
      box-shadow: 8px 8px 0 #111;
      padding: 1rem;
      max-width: 1000px;
      margin: auto;
    }
    .nav-links {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .nav-links a {
      color: #0284c7;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .project-filter {
      margin-bottom: 1rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .project-filter label { font-size: 0.85rem; font-weight: 600; }
    .project-filter select {
      padding: 6px 10px;
      border: 2px solid #111;
      border-radius: 6px;
      font-size: 0.85rem;
      flex: 1;
      min-width: 140px;
    }

    /* Mobile-friendly document list */
    .doc-list { list-style: none; }
    .doc-card {
      background: #f9fafb;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      padding: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .doc-card .doc-title {
      font-weight: 700;
      font-size: 0.9rem;
      word-break: break-all;
      margin-bottom: 0.3rem;
    }
    .doc-card .doc-meta {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 0.4rem;
      line-height: 1.4;
    }
    .doc-card .doc-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }
    .btn {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      text-decoration: none;
      border: 2px solid #111;
      cursor: pointer;
      text-align: center;
    }
    .btn-view { background: #10b981; color: white; }
    .btn-rename { background: #f59e0b; color: white; }
    .btn-rename:hover { background: #d97706; }
    .btn-approve { background: #3b82f6; color: white; }
    .btn-approve:hover { background: #2563eb; }
    .btn-reject { background: #ef4444; color: white; }
    .btn-reject:hover { background: #dc2828; }
    
    /* Status Badges */
    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-pending { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
    .badge-approved { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
    .badge-rejected { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: #888;
    }
    .empty-state p { margin-bottom: 0.5rem; }

    /* Rename & PDF Modals */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      justify-content: center;
      align-items: center;
      z-index: 999;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white;
      border: 3px solid #111;
      border-radius: 16px;
      box-shadow: 8px 8px 0 #111;
      padding: 1.5rem;
      max-width: 400px;
      width: 100%;
    }
    .modal h3 { margin-bottom: 1rem; font-size: 1rem; }
    .modal input {
      width: 100%;
      padding: 10px;
      border: 2px solid #111;
      border-radius: 8px;
      font-size: 0.95rem;
      margin-bottom: 0.75rem;
    }
    .modal .btn-group { display: flex; gap: 0.5rem; }
    .modal .btn-save { background: #10b981; color: white; border: 2px solid #111; border-radius: 8px; padding: 8px 16px; cursor: pointer; font-weight: 600; flex: 1; }
    .modal .btn-cancel { background: #e5e7eb; border: 2px solid #111; border-radius: 8px; padding: 8px 16px; cursor: pointer; font-weight: 600; flex: 1; }

    .pdf-modal {
      background: white;
      border: 3px solid #111;
      border-radius: 16px;
      box-shadow: 8px 8px 0 #111;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 900px;
      height: 85vh;
      overflow: hidden;
    }
    .pdf-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 15px;
      background: #f9fafb;
      border-bottom: 2px solid #111;
    }
    .pdf-modal-header h3 {
      font-size: 1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 80%;
    }
    .pdf-modal-body {
      flex: 1;
      width: 100%;
      background: #e5e7eb;
    }
    .pdf-modal-body iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Desktop: show table, hide cards */
    @media (min-width: 768px) {
      body { padding: 2rem; }
      .topbar h2 { font-size: 1.4rem; }
      .card { padding: 2rem; }
      .doc-list { display: none; }
      .doc-table { display: table; width: 100%; }
    }
    @media (max-width: 767px) {
      .doc-table { display: none; }
    }
    .doc-table { width: 100%; border-collapse: collapse; }
    .doc-table th {
      text-align: left;
      padding: 0.75rem 0.5rem;
      border-bottom: 2px solid #111;
      font-size: 0.75rem;
      text-transform: uppercase;
      color: #555;
    }
    .doc-table td {
      padding: 0.75rem 0.5rem;
      border-bottom: 1px solid #e5e7eb;
      font-size: 0.85rem;
    }
    .doc-table tr:hover td { background: #f9fafb; }
  </style>
</head>
<body>

<div class="topbar">
  <h2>📥 My Inbox</h2>
  <div class="user-info">
    <span id="userDisplay">Loading...</span>
    <button onclick="logout()">Sign Out</button>
  </div>
</div>

<div class="card">
  <div class="nav-links">
    <a href="/index.html">← Upload</a>
    <a href="/admin.html" id="adminLink" style="display:none;">⚙ Admin</a>
  </div>

  <div class="project-filter">
    <label>Filter:</label>
    <select id="projectFilter" onchange="filterDocs()">
      <option value="">All Projects</option>
    </select>
  </div>

  <table class="doc-table">
    <thead>
      <tr>
        <th>File</th>
        <th>Project</th>
        <th>Dept</th>
        <th>From</th>
        <th>Date</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="docTableBody">
      <tr><td colspan="7" class="empty-state"><p>Loading...</p></td></tr>
    </tbody>
  </table>

  <ul class="doc-list" id="docCardList">
    <li class="empty-state"><p>Loading...</p></li>
  </ul>
</div>

<div class="modal-overlay" id="renameModal">
  <div class="modal">
    <h3>Rename Document</h3>
    <p style="font-size:0.8rem;color:#666;margin-bottom:0.5rem;" id="renameCurrentName"></p>
    <input type="text" id="renameInput" placeholder="New filename (without extension)">
    <div class="btn-group">
      <button class="btn-save" onclick="doRename()">Save</button>
      <button class="btn-cancel" onclick="closeRename()">Cancel</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="pdfModal">
  <div class="pdf-modal">
    <div class="pdf-modal-header">
      <h3 id="pdfModalTitle">Document Viewer</h3>
      <button class="btn btn-cancel" onclick="closePdfModal()" style="border: 2px solid #111;">Close</button>
    </div>
    <div class="pdf-modal-body">
      <iframe id="pdfFrame"></iframe>
    </div>
  </div>
</div>

<script>
  const API_BASE = '';
  function getToken() { return localStorage.getItem('token'); }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '/login.html';
  }

  const token = getToken();
  if (!token) window.location.href = '/login.html';

  let allDocs = [];
  let projects = [];
  let currentUser = null;
  let renameDocId = null;
  let currentBlobUrl = null;

  // Load user info
  (async () => {
    try {
      const res = await fetch(API_BASE + '/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
      currentUser = await res.json();
      document.getElementById('userDisplay').textContent = currentUser.display_name || currentUser.email;
      if (currentUser.role === 'Executive') {
        document.getElementById('adminLink').style.display = 'inline';
      }
    } catch (e) { logout(); }
  })();

  // Load projects
  (async () => {
    try {
      const res = await fetch(API_BASE + '/projects', { headers: { 'Authorization': 'Bearer ' + token } });
      projects = await res.json();
      const filter = document.getElementById('projectFilter');
      projects.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id; opt.textContent = p.name;
        filter.appendChild(opt);
      });
    } catch (e) {}
  })();

  // Load documents
  (async () => {
    try {
      const res = await fetch(API_BASE + '/documents/my-inbox', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (res.status === 401) { logout(); return; }
      allDocs = await res.json();
      renderAll();
    } catch (e) {
      document.getElementById('docTableBody').innerHTML =
        '<tr><td colspan="7" class="empty-state"><p>Failed to load.</p></td></tr>';
    }
  })();

  function canRename() {
    return currentUser && (currentUser.role === 'Supervisor' || currentUser.role === 'Executive');
  }

  function getStatusBadge(status) {
    const s = status || 'pending';
    let cssClass = 'badge-pending';
    if (s === 'approved') cssClass = 'badge-approved';
    if (s === 'rejected') cssClass = 'badge-rejected';
    return `<span class="badge ${cssClass}">${s}</span>`;
  }

  function renderAll() {
    renderTable(allDocs);
    renderCards(allDocs);
  }

  function renderTable(docs) {
    const tbody = document.getElementById('docTableBody');
    if (docs.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty-state"><p>No documents found.</p></td></tr>';
      return;
    }
    tbody.innerHTML = docs.map(d => {
      const ext = d.filename.includes('.') ? '.' + d.filename.split('.').pop() : '';
      const baseName = d.filename.replace(ext, '');
      
      let actionBtns = `<button class="btn btn-view" style="padding:3px 10px;font-size:0.75rem;" onclick="viewDocument(${d.id}, '${d.filename.replace(/'/g, "\\'")}')">View</button>`;
      
      if (canRename()) {
        actionBtns += ` <button class="btn btn-rename" style="padding:3px 10px;font-size:0.75rem;" onclick="openRename(${d.id},'${baseName.replace(/'/g, "\\'")}')">Rename</button>`;
      }

      // Executive Approval Buttons
      if (currentUser && currentUser.role === 'Executive' && (!d.status || d.status === 'pending')) {
        actionBtns += ` <button class="btn btn-approve" style="padding:3px 10px;font-size:0.75rem;" onclick="updateStatus(${d.id}, 'approved')">Approve</button>`;
        actionBtns += ` <button class="btn btn-reject" style="padding:3px 10px;font-size:0.75rem;" onclick="updateStatus(${d.id}, 'rejected')">Reject</button>`;
      }

      // --- REPLACE YOUR MAP FUNCTION (APPROX. LINES 413-423) WITH THIS ---
    return `<tr>
        <td><strong style="font-size:0.8rem;word-break:break-all;">${d.filename}</strong></td>
        <td style="font-size:0.8rem;">${d.project_name || '—'}</td>
        <td style="font-size:0.8rem;">${d.department_name || '—'}</td>
        <td style="font-size:0.8rem;">${d.sender_email || '—'}</td>
        <td style="font-size:0.75rem;color:#666;">${new Date(d.created_at).toLocaleDateString()}</td>
        <td>${getStatusBadge(d.status)}</td>
        <td style="white-space:nowrap;">
            ${actionBtns}
            ${(token && JSON.parse(atob(token.split('.')[1])).role === 'executive') ? `
                <div style="margin-top: 5px;">
                    ${d.status !== 'approved' ? `<button style="background:#4CAF50; color:white; padding:2px 5px; font-size:0.7rem;" onclick="updateDocStatus(${d.id}, 'approved')">Approve</button>` : ''}
                    ${d.status !== 'rejected' ? `<button style="background:#f44336; color:white; padding:2px 5px; font-size:0.7rem;" onclick="updateDocStatus(${d.id}, 'rejected')">Reject</button>` : ''}
                    ${d.status !== 'pending' ? `<button style="background:#ff9800; color:white; padding:2px 5px; font-size:0.7rem;" onclick="updateDocStatus(${d.id}, 'pending')">Undo</button>` : ''}
                </div>
            ` : ''}
        </td>
    </tr>`;
}).join('');
  }

  function renderCards(docs) {
    const list = document.getElementById('docCardList');
    if (docs.length === 0) {
      list.innerHTML = '<li class="empty-state"><p>No documents found.</p></li>';
      return;
    }
    list.innerHTML = docs.map(d => {
      const ext = d.filename.includes('.') ? '.' + d.filename.split('.').pop() : '';
      const baseName = d.filename.replace(ext, '');
      
      let actionBtns = `<button class="btn btn-view" onclick="viewDocument(${d.id}, '${d.filename.replace(/'/g, "\\'")}')">View</button>`;
      
      if (canRename()) {
        actionBtns += ` <button class="btn btn-rename" onclick="openRename(${d.id},'${baseName.replace(/'/g, "\\'")}')">Rename</button>`;
      }

      if (currentUser && currentUser.role === 'Executive' && (!d.status || d.status === 'pending')) {
        actionBtns += ` <button class="btn btn-approve" onclick="updateStatus(${d.id}, 'approved')">Approve</button>`;
        actionBtns += ` <button class="btn btn-reject" onclick="updateStatus(${d.id}, 'rejected')">Reject</button>`;
      }

      return `<li class="doc-card">
        <div class="doc-title">${d.filename}</div>
        <div class="doc-meta">
          ${d.project_name || '—'} · ${d.department_name || '—'}<br>
          From: ${d.sender_email || '—'}<br>
          ${new Date(d.created_at).toLocaleDateString()} · ${getStatusBadge(d.status)}
        </div>
        <div class="doc-actions">
          ${actionBtns}
        </div>
      </li>`;
    }).join('');
  }

  function filterDocs() {
    const projectId = document.getElementById('projectFilter').value;
    const filtered = !projectId ? allDocs : allDocs.filter(d => d.project_id == projectId);
    renderTable(filtered);
    renderCards(filtered);
  }

  // --- Actions ---

  function openRename(docId, currentName) {
    renameDocId = docId;
    document.getElementById('renameCurrentName').textContent = 'Current: ' + currentName;
    document.getElementById('renameInput').value = currentName;
    document.getElementById('renameModal').classList.add('open');
  }

  function closeRename() {
    renameDocId = null;
    document.getElementById('renameModal').classList.remove('open');
  }

  async function doRename() {
    const newName = document.getElementById('renameInput').value.trim();
    if (!newName) { alert('Enter a filename.'); return; }

    const res = await fetch(API_BASE + '/documents/' + renameDocId + '/rename', {
      method: 'PATCH',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ filename: newName })
    });
    const data = await res.json();
    if (res.ok) {
      closeRename();
      const docsRes = await fetch(API_BASE + '/documents/my-inbox', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      allDocs = await docsRes.json();
      renderAll();
    } else {
      alert(data.error || 'Rename failed');
    }
  }

  async function updateStatus(docId, newStatus) {
    if (!confirm(`Are you sure you want to mark this document as ${newStatus}?`)) return;
    try {
      const res = await fetch(API_BASE + '/documents/' + docId + '/status', {
        method: 'PATCH',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus })
      });
      
      const data = await res.json();
      if (res.ok) {
        // Refresh the documents payload seamlessly
        const docsRes = await fetch(API_BASE + '/documents/my-inbox', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        allDocs = await docsRes.json();
        renderAll();
      } else {
        alert(data.message || 'Failed to update status');
      }
    } catch (err) {
      console.error(err);
      alert('Network error while updating status.');
    }
  }

  // --- Secure PDF Viewer ---
  async function viewDocument(docId, filename) {
    document.getElementById('pdfModalTitle').textContent = 'Loading ' + filename + '...';
    document.getElementById('pdfModal').classList.add('open');
    const frame = document.getElementById('pdfFrame');
    frame.src = ''; 

    try {
      const res = await fetch(API_BASE + '/documents/' + docId + '/stream', {
        headers: { 'Authorization': 'Bearer ' + token }
      });

      if (!res.ok) {
        const err = await res.json();
        alert('Error: ' + (err.error || 'Failed to load document'));
        closePdfModal();
        return;
      }

      const blob = await res.blob();
      if (currentBlobUrl) {
        URL.revokeObjectURL(currentBlobUrl); // Memory cleanup
      }
      currentBlobUrl = URL.createObjectURL(blob);
      frame.src = currentBlobUrl;
      document.getElementById('pdfModalTitle').textContent = filename;
    } catch (err) {
      console.error('Streaming error:', err);
      alert('Failed to securely fetch document.');
      closePdfModal();
    }
  }

  function closePdfModal() {
    document.getElementById('pdfModal').classList.remove('open');
    const frame = document.getElementById('pdfFrame');
    frame.src = '';
    if (currentBlobUrl) {
      URL.revokeObjectURL(currentBlobUrl);
      currentBlobUrl = null;
    }
  }
  async function updateDocStatus(documentId, newStatus) {
    if (newStatus === 'rejected' && !confirm('Reject this document?')) return;
    try {
        const response = await fetch(`/documents/${documentId}/status`, {
            method: 'PATCH',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + localStorage.getItem('token')
            },
            body: JSON.stringify({ status: newStatus })
        });
        if (response.ok) {
            location.reload(); // Quick refresh to update the UI
        } else {
            const data = await response.json();
            alert(data.message || 'Error updating document status.');
        }
    } catch (error) {
        console.error('Error:', error);
    }
}
</script>
</body>
</html>
