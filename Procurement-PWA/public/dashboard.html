<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>My Inbox — DocHandler</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f4f7f6;
      padding: 1rem;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1000px;
      margin: 0 auto 1rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .topbar h2 { font-size: 1.2rem; color: #111; }
    .topbar .user-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: #555;
    }
    .topbar button {
      background: none;
      border: 2px solid #111;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.8rem;
      white-space: nowrap;
    }
    .card {
      background: white;
      border: 3px solid #111;
      border-radius: 16px;
      box-shadow: 8px 8px 0 #111;
      padding: 1rem;
      max-width: 1000px;
      margin: auto;
    }
    .nav-links {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .nav-links a {
      color: #0284c7;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .filter-bar {
      margin-bottom: 1rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .filter-bar label { font-size: 0.85rem; font-weight: 600; }
    .filter-bar select {
      padding: 6px 10px;
      border: 2px solid #111;
      border-radius: 6px;
      font-size: 0.85rem;
      flex: 1;
      min-width: 140px;
    }
    .filter-bar .btn-clear-filters {
      background: #e5e7eb;
      border: 2px solid #111;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    /* Mobile-friendly document list */
    .doc-list { list-style: none; }
    .doc-card {
      background: #f9fafb;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      padding: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .doc-card .doc-title {
      font-weight: 700;
      font-size: 0.9rem;
      word-break: break-all;
      margin-bottom: 0.3rem;
    }
    .doc-card .doc-meta {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 0.4rem;
      line-height: 1.4;
    }
    .doc-card .doc-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.4rem;
      margin-top: 0.5rem;
    }
    /* Req 4: Tab toggle */
    .tab-bar {
      display: flex;
      gap: 0;
      margin-bottom: 1rem;
      border-bottom: 2px solid #111;
    }
    .tab-btn {
      padding: 8px 18px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      color: #888;
    }
    .tab-btn.active {
      color: #111;
      border-bottom-color: #111;
    }
    /* Req 2: Approval notes modal textarea */
    .modal textarea {
      width: 100%;
      padding: 10px;
      border: 2px solid #111;
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: inherit;
      resize: vertical;
      min-height: 80px;
      margin-bottom: 0.75rem;
    }

    /* Standardized Buttons */
    .btn {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      text-decoration: none;
      border: 2px solid #111;
      cursor: pointer;
      text-align: center;
    }
    .btn-view { background: #10b981; color: white; }
    .btn-rename { background: #f59e0b; color: white; }
    .btn-rename:hover { background: #d97706; }
    
    /* Executive Action Buttons */
    .btn-approve { background: #10b981; color: white; }
    .btn-approve:hover { background: #059669; }
    .btn-reject { background: #ef4444; color: white; }
    .btn-reject:hover { background: #dc2828; }
    .btn-undo { background: #f59e0b; color: white; }
    .btn-undo:hover { background: #d97706; }
    
    /* Status Badges */
    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-pending { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
    .badge-approved { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
    .badge-rejected { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: #888;
    }
    .empty-state p { margin-bottom: 0.5rem; }

    /* Rename & PDF Modals */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      justify-content: center;
      align-items: center;
      z-index: 999;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white;
      border: 3px solid #111;
      border-radius: 16px;
      box-shadow: 8px 8px 0 #111;
      padding: 1.5rem;
      max-width: 400px;
      width: 100%;
    }
    .modal h3 { margin-bottom: 1rem; font-size: 1rem; }
    .modal input {
      width: 100%;
      padding: 10px;
      border: 2px solid #111;
      border-radius: 8px;
      font-size: 0.95rem;
      margin-bottom: 0.75rem;
    }
    .modal .btn-group { display: flex; gap: 0.5rem; }
    .modal .btn-save { background: #10b981; color: white; border: 2px solid #111; border-radius: 8px; padding: 8px 16px; cursor: pointer; font-weight: 600; flex: 1; }
    .modal .btn-cancel { background: #e5e7eb; border: 2px solid #111; border-radius: 8px; padding: 8px 16px; cursor: pointer; font-weight: 600; flex: 1; }

    .pdf-modal {
      background: white;
      border: 3px solid #111;
      border-radius: 16px;
      box-shadow: 8px 8px 0 #111;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 900px;
      height: 85vh;
      overflow: hidden;
    }
    .pdf-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 15px;
      background: #f9fafb;
      border-bottom: 2px solid #111;
    }
    .pdf-modal-header h3 {
      font-size: 1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 80%;
    }
    .pdf-modal-body {
      flex: 1;
      width: 100%;
      background: #e5e7eb;
    }
    .pdf-modal-body iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Desktop: show table, hide cards */
    @media (min-width: 768px) {
      body { padding: 2rem; }
      .topbar h2 { font-size: 1.4rem; }
      .card { padding: 2rem; }
      .doc-list { display: none; }
      .doc-table { display: table; width: 100%; }
    }
    @media (max-width: 767px) {
      .doc-table { display: none; }
    }
    .doc-table { width: 100%; border-collapse: collapse; }
    .doc-table th {
      text-align: left;
      padding: 0.75rem 0.5rem;
      border-bottom: 2px solid #111;
      font-size: 0.75rem;
      text-transform: uppercase;
      color: #555;
    }
    .doc-table td {
      padding: 0.75rem 0.5rem;
      border-bottom: 1px solid #e5e7eb;
      font-size: 0.85rem;
    }
    .doc-table tr:hover td { background: #f9fafb; }
  </style>
</head>
<body>

<div class="topbar">
  <h2 id="pageTitle">📥 My Inbox</h2>
  <div class="user-info">
    <span id="userDisplay">Loading...</span>
    <button onclick="logout()">Sign Out</button>
  </div>
</div>

<div class="card">
  <div class="nav-links">
    <a href="/index.html">← Upload</a>
    <a href="/admin.html" id="adminLink" style="display:none;">⚙ Admin</a>
  </div>

  <!-- Req 4: Tab toggle -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tabInbox" onclick="switchTab('inbox')">📥 Inbox</button>
    <button class="tab-btn" id="tabSent" onclick="switchTab('sent')">📤 Sent</button>
  </div>

  <div class="filter-bar" id="filterBar">
    <label>Filter:</label>
    <select id="projectFilter" onchange="filterDocs()">
      <option value="">All Projects</option>
    </select>
    <select id="senderFilter" onchange="filterDocs()">
      <option value="">All Senders</option>
    </select>
    <select id="fileTypeFilter" onchange="filterDocs()">
      <option value="">All File Types</option>
    </select>
    <button class="btn-clear-filters" onclick="clearFilters()">Clear</button>
  </div>

  <table class="doc-table" id="docTable">
    <thead id="docTableHead">
      <tr>
        <th>File</th>
        <th>Project</th>
        <th>Dept</th>
        <th id="thFromTo">From</th>
        <th>Date</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="docTableBody">
      <tr><td colspan="7" class="empty-state"><p>Loading...</p></td></tr>
    </tbody>
  </table>

  <ul class="doc-list" id="docCardList">
    <li class="empty-state"><p>Loading...</p></li>
  </ul>
</div>

<div class="modal-overlay" id="renameModal">
  <div class="modal">
    <h3>Rename Document</h3>
    <p style="font-size:0.8rem;color:#666;margin-bottom:0.5rem;" id="renameCurrentName"></p>
    <input type="text" id="renameInput" placeholder="New filename (without extension)">
    <div class="btn-group">
      <button class="btn-save" onclick="doRename()">Save</button>
      <button class="btn-cancel" onclick="closeRename()">Cancel</button>
    </div>
  </div>
</div>

<!-- Req 2: Approval notes modal -->
<div class="modal-overlay" id="approvalModal">
  <div class="modal">
    <h3 id="approvalModalTitle">Add a Note (Optional)</h3>
    <p style="font-size:0.8rem;color:#666;margin-bottom:0.5rem;" id="approvalDocName"></p>
    <textarea id="approvalNotes" placeholder="Add an optional note for the sender..."></textarea>
    <div class="btn-group">
      <button class="btn-save" id="approvalConfirmBtn" onclick="confirmApproval()">Confirm</button>
      <button class="btn-cancel" onclick="closeApprovalModal()">Cancel</button>
    </div>
  </div>
</div>
  <div class="pdf-modal">
    <div class="pdf-modal-header">
      <h3 id="pdfModalTitle">Document Viewer</h3>
      <button class="btn btn-cancel" onclick="closePdfModal()" style="border: 2px solid #111;">Close</button>
    </div>
    <div class="pdf-modal-body">
      <iframe id="pdfFrame"></iframe>
    </div>
  </div>
</div>

<script>
  const API_BASE = '';
  const token = localStorage.getItem('token');
  if (!token) window.location.href = '/login.html';

  // Req 7: decode JWT for initial role-based UI (backed up by DB re-check on the server)
  let jwtRole = null;
  try { jwtRole = JSON.parse(atob(token.split('.')[1])).role; } catch(e) {}

  let allDocs = [];
  let currentUser = null;
  let renameDocId = null;
  let currentBlobUrl = null;
  let currentTab = 'inbox'; // Req 4

  // Req 2: approval modal state
  let pendingApprovalDocId = null;
  let pendingApprovalStatus = null;

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '/login.html';
  }

  // Load user info
  (async () => {
    try {
      const res = await fetch(API_BASE + '/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
      currentUser = await res.json();
      document.getElementById('userDisplay').textContent = currentUser.display_name || currentUser.email;
      const isAdmin = currentUser.role === 'Executive' || currentUser.role === 'Admin';
      if (isAdmin) {
        document.getElementById('adminLink').style.display = 'inline';
        // Req 7: dynamic admin nav for Admin role
        const topbar = document.querySelector('.topbar');
        const adminNav = document.createElement('div');
        adminNav.style.cssText = 'display:flex;gap:10px;';
        adminNav.innerHTML = `
          <button onclick="window.location.href='/admin.html'" style="background:#111;color:white;padding:6px 12px;border-radius:6px;cursor:pointer;border:none;">Admin Portal</button>
          <button onclick="window.location.href='/admin/projects.html'" style="background:#111;color:white;padding:6px 12px;border-radius:6px;cursor:pointer;border:none;">Projects</button>
        `;
        topbar.appendChild(adminNav);
      }
    } catch (e) { logout(); }
  })();

  // Load projects for filter dropdown
  (async () => {
    try {
      const res = await fetch(API_BASE + '/projects', { headers: { 'Authorization': 'Bearer ' + token } });
      const projects = await res.json();
      const filter = document.getElementById('projectFilter');
      projects.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id; opt.textContent = p.name;
        filter.appendChild(opt);
      });
    } catch (e) {}
  })();

  // Req 4: tab switching
  async function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tabInbox').classList.toggle('active', tab === 'inbox');
    document.getElementById('tabSent').classList.toggle('active', tab === 'sent');
    document.getElementById('pageTitle').textContent = tab === 'inbox' ? '📥 My Inbox' : '📤 Sent';
    document.getElementById('thFromTo').textContent = tab === 'inbox' ? 'From' : 'To';
    document.getElementById('filterBar').style.display = tab === 'inbox' ? 'flex' : 'none';
    await loadDocs();
  }

  async function loadDocs() {
    const endpoint = currentTab === 'inbox' ? '/documents/my-inbox' : '/documents/my-outbox';
    try {
      const res = await fetch(API_BASE + endpoint, { headers: { 'Authorization': 'Bearer ' + token } });
      if (res.status === 401) { logout(); return; }
      allDocs = await res.json();
      if (currentTab === 'inbox') populateFilterOptions();
      renderAll();
    } catch (e) {
      document.getElementById('docTableBody').innerHTML =
        '<tr><td colspan="7" class="empty-state"><p>Failed to load.</p></td></tr>';
    }
  }

  // Initial load
  loadDocs();

  function getFileExt(filename) {
    if (!filename || !filename.includes('.')) return 'Other';
    return filename.split('.').pop().toUpperCase();
  }

  function populateFilterOptions() {
    const senderFilter = document.getElementById('senderFilter');
    const seenSenders = new Map();
    allDocs.forEach(d => {
      if (d.sender_email && !seenSenders.has(d.sender_email))
        seenSenders.set(d.sender_email, d.sender_name || d.sender_email);
    });
    senderFilter.innerHTML = '<option value="">All Senders</option>' +
      [...seenSenders.entries()].sort((a,b) => a[1].localeCompare(b[1]))
        .map(([email, label]) => `<option value="${email}">${label}</option>`).join('');

    const fileTypeFilter = document.getElementById('fileTypeFilter');
    const seenTypes = new Set(allDocs.map(d => getFileExt(d.filename)));
    fileTypeFilter.innerHTML = '<option value="">All File Types</option>' +
      [...seenTypes].sort().map(ext => `<option value="${ext}">${ext}</option>`).join('');
  }

  function canRename() {
    return currentUser && (currentUser.role === 'Supervisor' || currentUser.role === 'Executive' || currentUser.role === 'Admin');
  }

  function isApprover() {
    // Req 7: Admin inherits Executive rights for approval
    return currentUser && (currentUser.role === 'Executive' || currentUser.role === 'Admin');
  }

  function getStatusBadge(status) {
    const s = (status || 'pending').toLowerCase();
    const cls = s === 'approved' ? 'badge-approved' : s === 'rejected' ? 'badge-rejected' : 'badge-pending';
    return `<span class="badge ${cls}">${s}</span>`;
  }

  function buildActionButtons(d, baseName) {
    // Req 4: Download button added alongside View
    let btns = `<button class="btn btn-view" onclick="viewDocument(${d.id}, '${d.filename.replace(/'/g, "\\'")}')">View</button>`;
    btns += ` <button class="btn btn-rename" style="background:#6366f1;color:white;" onclick="downloadDocument(${d.id})">Download</button>`;

    if (canRename() && currentTab === 'inbox') {
      btns += ` <button class="btn btn-rename" onclick="openRename(${d.id},'${baseName.replace(/'/g, "\\'")}')">Rename</button>`;
    }

    // Req 2+7: approval buttons open the notes modal
    if (isApprover() && currentTab === 'inbox') {
      const st = (d.status || 'pending').toLowerCase();
      if (st !== 'approved')
        btns += ` <button class="btn btn-approve" onclick="openApprovalModal(${d.id}, '${d.filename.replace(/'/g,"\\'")}', 'approved')">Approve</button>`;
      if (st !== 'rejected')
        btns += ` <button class="btn btn-reject" onclick="openApprovalModal(${d.id}, '${d.filename.replace(/'/g,"\\'")}', 'rejected')">Reject</button>`;
      if (st !== 'pending')
        btns += ` <button class="btn btn-undo" onclick="openApprovalModal(${d.id}, '${d.filename.replace(/'/g,"\\'")}', 'pending')">Undo</button>`;
    }
    return btns;
  }

  function renderAll() { renderTable(allDocs); renderCards(allDocs); }

  function renderTable(docs) {
    const tbody = document.getElementById('docTableBody');
    if (docs.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty-state"><p>No documents found.</p></td></tr>';
      return;
    }
    tbody.innerHTML = docs.map(d => {
      const ext = d.filename.includes('.') ? '.' + d.filename.split('.').pop() : '';
      const baseName = d.filename.replace(ext, '');
      const actionBtns = buildActionButtons(d, baseName);
      // Req 4: outbox shows recipient instead of sender
      const personCol = currentTab === 'inbox'
        ? (d.sender_email || '—')
        : (d.recipient_name || d.recipient_email || '—');
      return `<tr>
        <td><strong style="font-size:0.8rem;word-break:break-all;">${d.is_urgent ? '🔴 ' : ''}${d.filename}</strong></td>
        <td style="font-size:0.8rem;">${d.project_name || '—'}</td>
        <td style="font-size:0.8rem;">${d.department_name || '—'}</td>
        <td style="font-size:0.8rem;">${personCol}</td>
        <td style="font-size:0.75rem;color:#666;">${new Date(d.created_at).toLocaleDateString()}</td>
        <td>${getStatusBadge(d.status)}</td>
        <td>${actionBtns}</td>
      </tr>`;
    }).join('');
  }

  function renderCards(docs) {
    const list = document.getElementById('docCardList');
    if (docs.length === 0) {
      list.innerHTML = '<li class="empty-state"><p>No documents found.</p></li>';
      return;
    }
    list.innerHTML = docs.map(d => {
      const ext = d.filename.includes('.') ? '.' + d.filename.split('.').pop() : '';
      const baseName = d.filename.replace(ext, '');
      const actionBtns = buildActionButtons(d, baseName);
      const personCol = currentTab === 'inbox'
        ? `From: ${d.sender_email || '—'}`
        : `To: ${d.recipient_name || d.recipient_email || '—'}`;
      return `<li class="doc-card">
        <div class="doc-title">${d.is_urgent ? '🔴 ' : ''}${d.filename}</div>
        <div class="doc-meta">
          ${d.project_name || '—'} · ${d.department_name || '—'}<br>
          ${personCol}<br>
          ${new Date(d.created_at).toLocaleDateString()} · ${getStatusBadge(d.status)}
        </div>
        <div class="doc-actions">${actionBtns}</div>
      </li>`;
    }).join('');
  }

  function filterDocs() {
    const projectId = document.getElementById('projectFilter').value;
    const sender = document.getElementById('senderFilter').value;
    const fileType = document.getElementById('fileTypeFilter').value;
    const filtered = allDocs.filter(d => {
      if (projectId && d.project_id != projectId) return false;
      if (sender && d.sender_email !== sender) return false;
      if (fileType && getFileExt(d.filename) !== fileType) return false;
      return true;
    });
    renderTable(filtered);
    renderCards(filtered);
  }

  function clearFilters() {
    document.getElementById('projectFilter').value = '';
    document.getElementById('senderFilter').value = '';
    document.getElementById('fileTypeFilter').value = '';
    filterDocs();
  }

  // --- Rename ---
  function openRename(docId, currentName) {
    renameDocId = docId;
    document.getElementById('renameCurrentName').textContent = 'Current: ' + currentName;
    document.getElementById('renameInput').value = currentName;
    document.getElementById('renameModal').classList.add('open');
  }
  function closeRename() { renameDocId = null; document.getElementById('renameModal').classList.remove('open'); }

  async function doRename() {
    const newName = document.getElementById('renameInput').value.trim();
    if (!newName) { alert('Enter a filename.'); return; }
    const res = await fetch(API_BASE + '/documents/' + renameDocId + '/rename', {
      method: 'PATCH',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ filename: newName })
    });
    const data = await res.json();
    if (res.ok) { closeRename(); await loadDocs(); }
    else alert(data.error || 'Rename failed');
  }

  // --- Req 2: Approval notes modal ---
  function openApprovalModal(docId, filename, status) {
    pendingApprovalDocId = docId;
    pendingApprovalStatus = status;
    const isUndo = status === 'pending';
    document.getElementById('approvalModalTitle').textContent = isUndo ? 'Undo Status' : `${status === 'approved' ? 'Approve' : 'Reject'} Document`;
    document.getElementById('approvalDocName').textContent = filename;
    document.getElementById('approvalNotes').value = '';
    document.getElementById('approvalNotes').style.display = isUndo ? 'none' : 'block';
    document.getElementById('approvalConfirmBtn').style.background = status === 'rejected' ? '#ef4444' : status === 'approved' ? '#10b981' : '#f59e0b';
    document.getElementById('approvalModal').classList.add('open');
  }
  function closeApprovalModal() {
    document.getElementById('approvalModal').classList.remove('open');
    pendingApprovalDocId = null;
    pendingApprovalStatus = null;
  }

  async function confirmApproval() {
    const notes = document.getElementById('approvalNotes').value.trim();
    try {
      const res = await fetch(API_BASE + '/documents/' + pendingApprovalDocId + '/status', {
        method: 'PATCH',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: pendingApprovalStatus, notes })
      });
      const data = await res.json();
      if (res.ok) { closeApprovalModal(); await loadDocs(); }
      else alert(data.message || 'Failed to update status.');
    } catch (err) {
      alert('Network error while updating status.');
    }
  }

  // --- Req 4: Download ---
  function downloadDocument(docId) {
    // Open the download endpoint in a hidden anchor — browser handles Save-As
    const a = document.createElement('a');
    a.href = API_BASE + '/documents/' + docId + '/download?token=' + encodeURIComponent(token);
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  // --- Secure PDF Viewer ---
  async function viewDocument(docId, filename) {
    document.getElementById('pdfModalTitle').textContent = 'Loading ' + filename + '...';
    document.getElementById('pdfModal').classList.add('open');
    const frame = document.getElementById('pdfFrame');
    frame.src = '';
    try {
      const res = await fetch(API_BASE + '/documents/' + docId + '/stream', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!res.ok) {
        const err = await res.json();
        alert('Error: ' + (err.message || 'Failed to load document'));
        closePdfModal(); return;
      }
      const blob = await res.blob();
      if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
      currentBlobUrl = URL.createObjectURL(blob);
      frame.src = currentBlobUrl;
      document.getElementById('pdfModalTitle').textContent = filename;
    } catch (err) {
      alert('Failed to securely fetch document.');
      closePdfModal();
    }
  }

  function closePdfModal() {
    document.getElementById('pdfModal').classList.remove('open');
    document.getElementById('pdfFrame').src = '';
    if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); currentBlobUrl = null; }
  }
</script>
</body>
</html>
